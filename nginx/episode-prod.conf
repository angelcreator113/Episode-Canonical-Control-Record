server {
    server_name primepisodes.com www.primepisodes.com;
    root /var/www/html;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Allow large file uploads (500MB max)
    client_max_body_size 500M;

    # API proxy - MUST be before catch-all (port 3000 for production)
    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;            # Required for SSE (Server-Sent Events) streaming
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://localhost:3000/health;
    }

    # Static build assets (JS/CSS from Vite) - long cache, content-hashed filenames
    location ~* ^/assets/.+\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Frontend SPA routing (catch-all)
    # try_files without $uri/ prevents directory listing for /assets
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # SSL will be added by certbot:
    #   sudo certbot --nginx -d primepisodes.com -d www.primepisodes.com
}
