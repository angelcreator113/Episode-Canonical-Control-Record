name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DEPLOY TO PRODUCTION" to confirm'
        required: true
        default: ''
      reason:
        description: 'Deployment reason/ticket number'
        required: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deployment confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY TO PRODUCTION" ]; then
            echo "❌ Production deployment cancelled - exact confirmation phrase required"
            exit 1
          fi
          echo "✅ Production deployment confirmed"
          echo "📋 Reason: ${{ github.event.inputs.reason }}"

  test:
    needs: validate
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: episode_metadata_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "DROP DATABASE IF EXISTS episode_metadata_test;"
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE episode_metadata_test;"

      - name: Run database migrations
        run: npm run migrate:up
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/episode_metadata_test
          NODE_ENV: test

      - name: Run tests
        run: npm test -- --coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/episode_metadata_test
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/episode_metadata_test
          JWT_SECRET: test-secret-key-minimum-32-characters-long
          NODE_ENV: test

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --production

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Create artifact
        run: |
          mkdir -p deploy
          cp -r src deploy/
          cp -r src/migrations deploy/
          cp -r frontend/dist deploy/frontend-dist
          cp package.json deploy/
          cp package-lock.json deploy/
          cp nginx.conf deploy/ || true
          tar -czf episode-metadata-production-${{ github.sha }}.tar.gz deploy/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: episode-metadata-build-production
          path: episode-metadata-production-${{ github.sha }}.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://primepisodes.com

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ github.token }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: episode-metadata-build-production

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Fail fast if the prod host is unreachable or out of disk — before we
      # run migrations or create a snapshot. If SSH is broken we'd end up with
      # a schema-ahead-of-code state, which is worse than just aborting early.
      - name: Preflight — SSH reachability + disk-space guard
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          if [ -z "$EC2_HOST" ] || [ -z "$EC2_SSH_KEY" ]; then
            echo "::error title=Production secrets missing::EC2_HOST or EC2_SSH_KEY not configured. Refusing to proceed."
            exit 1
          fi

          if [ -z "$EC2_USER" ]; then
            EC2_USER="ubuntu"
          fi

          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH_OPTS="-i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o BatchMode=yes -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ConnectionAttempts=2 -o ServerAliveInterval=10 -o ServerAliveCountMax=2"

          echo "🌐 Runner network diagnostics"
          RUNNER_IP=$(curl -fsS https://api.ipify.org || true)
          if [ -n "$RUNNER_IP" ]; then
            echo "  - Runner public IP: $RUNNER_IP"
            echo "  - If SSH fails, ensure Security Group allows TCP/22 from this IP (or GitHub Actions IP ranges)."
          else
            echo "  - Runner public IP: unavailable"
          fi
          if timeout 5 bash -c "cat < /dev/null > /dev/tcp/$EC2_HOST/22" 2>/dev/null; then
            echo "  - Raw TCP probe: port 22 open"
          else
            echo "  - Raw TCP probe: port 22 closed/unreachable from runner"
          fi

          echo "🔌 Probing SSH to $EC2_HOST..."
          REACHABLE=false
          LAST_ERR=""
          for i in 1 2 3 4 5 6; do
            LAST_ERR=$(ssh $SSH_OPTS $EC2_USER@$EC2_HOST 'echo ok' 2>&1 >/dev/null || true)
            if [ -z "$LAST_ERR" ]; then
              echo "✅ SSH reachable (attempt $i)"
              REACHABLE=true
              break
            fi
            if [ $i -lt 6 ]; then
              echo "  ⏳ Attempt $i failed, retrying in 15s..."
              sleep 15
            fi
          done

          if [ "$REACHABLE" != "true" ]; then
            echo "::error title=Production EC2 SSH preflight failed::Could not open SSH session to $EC2_USER@$EC2_HOST after 6 attempts (~3m). Deploy aborted BEFORE migrations ran — no state changed."
            echo ""
            echo "Last SSH error:"
            echo "  $LAST_ERR"
            echo ""
            echo "Most common causes (ordered by likelihood):"
            echo "  1. Wrong username or SSH key for this host"
            echo "     - Current user: $EC2_USER"
            echo "     - If your AMI user is ec2-user, ubuntu, or admin, set EC2_USER accordingly"
            echo "     - Ensure EC2_SSH_KEY matches the instance key pair private key"
            echo "  2. EC2 instance stopped or rebooting — check AWS console and start it"
            echo "  3. Disk 100% full → instance becomes SSH-unresponsive"
            echo "     Recover via AWS SSM Session Manager, then clean ~/.pm2/logs/*.log"
            echo "  4. Security Group blocking port 22 from GitHub Actions runners"
            echo "     Compare the runner public IP printed above with your inbound SG rules"
            echo "  5. EC2 out of memory and swapping — reboot from AWS console"
            echo ""
            echo "After fixing, re-run this workflow from the Actions tab."
            exit 1
          fi

          echo ""
          echo "💾 Checking disk space on EC2..."
          FREE_MB=$(ssh $SSH_OPTS $EC2_USER@$EC2_HOST 'df -BM --output=avail / | tail -1 | tr -d " M"')
          echo "  Free space on /: ${FREE_MB}MB"

          MIN_FREE_MB=500
          if [ "$FREE_MB" -lt "$MIN_FREE_MB" ]; then
            echo "::error title=Production EC2 disk almost full::Only ${FREE_MB}MB free on /, need at least ${MIN_FREE_MB}MB. Deploy aborted BEFORE migrations ran."
            echo ""
            echo "Top space consumers on the instance:"
            ssh $SSH_OPTS $EC2_USER@$EC2_HOST 'sudo du -hx / 2>/dev/null | sort -hr | head -10' || true
            echo ""
            echo "Quick cleanup:"
            echo "  rm -rf ~/.pm2/logs/*.log"
            echo "  rm -rf ~/episode-metadata/logs/*.log"
            echo "  sudo journalctl --vacuum-size=10M"
            echo "  sudo apt-get clean"
            exit 1
          fi

          echo "✅ Preflight passed — SSH reachable, ${FREE_MB}MB free."

      - name: Create production backup
        run: |
          echo "📦 Creating production database backup..."
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          echo "Backup: episode-control-prod-backup-$TIMESTAMP"
          # Add backup command: aws rds create-db-snapshot --db-instance-identifier episode-control-prod --db-snapshot-identifier prod-backup-$TIMESTAMP

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DB_SSL_REJECT_UNAUTHORIZED: 'false'
        run: |
          echo "🔄 Running production database migrations..."
          npm ci
          npx sequelize-cli db:migrate --env production
          echo "✅ Migrations completed successfully"

      - name: Deploy to Production
        run: |
          echo "🚀 Deploying to PRODUCTION environment..."
          echo "Database: episode-control-prod"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: main"
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "Deployed by: ${{ github.actor }}"
          
          # Extract artifact
          tar -xzf episode-metadata-production-${{ github.sha }}.tar.gz
          
          # Setup SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          EC2_USER="${{ secrets.EC2_USER }}"
          if [ -z "$EC2_USER" ]; then
            EC2_USER="ubuntu"
          fi
          
          # Ensure production .env has DB credentials + third-party API keys
          echo "🔑 Writing DB credentials + API keys to production .env..."
          # Write credentials to temp file, SCP to server, then merge into .env
          # This avoids all shell interpretation issues with special chars (e.g. !! in passwords)
          CREDS_FILE=$(mktemp)
          printf '%s\n' \
            'DB_HOST=${{ secrets.PROD_DB_HOST }}' \
            'DB_NAME=${{ secrets.PROD_DB_NAME }}' \
            'DB_USER=${{ secrets.PROD_DB_USER }}' \
            'DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}' \
            > "$CREDS_FILE"

          # Optional API keys — only append when the secret is set, so a deploy
          # without the secret configured doesn't wipe an existing value from a
          # previous manual setup. If you rotate a key to a new value just set
          # the secret; if you want to clear one, do so directly in .env on EC2.
          if [ -n '${{ secrets.FAL_KEY }}' ]; then
            echo 'FAL_KEY=${{ secrets.FAL_KEY }}' >> "$CREDS_FILE"
          fi
          if [ -n '${{ secrets.REMOVEBG_API_KEY }}' ]; then
            echo 'REMOVEBG_API_KEY=${{ secrets.REMOVEBG_API_KEY }}' >> "$CREDS_FILE"
          fi

          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
            "$CREDS_FILE" $EC2_USER@${{ secrets.EC2_HOST }}:/tmp/db_creds.env
          rm -f "$CREDS_FILE"

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=120 -o ConnectTimeout=10 \
            $EC2_USER@${{ secrets.EC2_HOST }} '
              ENV_FILE=/home/ubuntu/episode-metadata/.env
              mkdir -p /home/ubuntu/episode-metadata
              touch "$ENV_FILE"
              while IFS= read -r line; do
                KEY="${line%%=*}"
                if grep -q "^${KEY}=" "$ENV_FILE"; then
                  grep -v "^${KEY}=" "$ENV_FILE" > "${ENV_FILE}.tmp"
                  echo "$line" >> "${ENV_FILE}.tmp"
                  mv "${ENV_FILE}.tmp" "$ENV_FILE"
                else
                  echo "$line" >> "$ENV_FILE"
                fi
              done < /tmp/db_creds.env
              rm -f /tmp/db_creds.env
            '
          echo '✓ DB credentials written to .env'

          # Upload built files to server
          echo "📤 Uploading built files to production server..."
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=120 -o ConnectTimeout=10 \
            -r deploy/* $EC2_USER@${{ secrets.EC2_HOST }}:/home/ubuntu/episode-metadata-deploy/
          
          # Copy and run deployment script with SSH keep-alive and retry logic
          MAX_RETRIES=3
          RETRY_DELAY=30
          
          for i in $(seq 1 $MAX_RETRIES); do
            echo "🔄 Deployment attempt $i of $MAX_RETRIES..."
            
            if scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=120 -o ConnectTimeout=10 .github/scripts/deploy-production.sh $EC2_USER@${{ secrets.EC2_HOST }}:/tmp/deploy-prod.sh; then
              if ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=120 -o ConnectTimeout=10 $EC2_USER@${{ secrets.EC2_HOST }} "DATABASE_URL='${{ secrets.PRODUCTION_DATABASE_URL }}' chmod +x /tmp/deploy-prod.sh && /tmp/deploy-prod.sh"; then
                echo "✅ Deployment successful on attempt $i"
                break
              fi
            fi
            
            if [ $i -lt $MAX_RETRIES ]; then
              echo "⚠️  Deployment attempt $i failed, waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
            else
              echo "❌ All deployment attempts failed"
              exit 1
            fi
          done
          
          echo "✅ Deployment to EC2 complete"

      - name: Run smoke tests
        run: |
          echo "🧪 Running production health checks..."
          MAX_ATTEMPTS=10
          WAIT_SECONDS=6
          for url in https://primepisodes.com/health https://www.primepisodes.com/health; do
            echo "  Checking $url ..."
            for i in $(seq 1 $MAX_ATTEMPTS); do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$url" || true)
              if [ "$HTTP_CODE" = "200" ]; then
                echo "  ✅ $url returned $HTTP_CODE (attempt $i)"
                break
              fi
              echo "  ⏳ Attempt $i/$MAX_ATTEMPTS — got HTTP $HTTP_CODE, retrying in ${WAIT_SECONDS}s..."
              if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
                echo "  ❌ $url failed after $MAX_ATTEMPTS attempts (last HTTP $HTTP_CODE)"
                curl -s "$url" | head -20
                exit 1
              fi
              sleep $WAIT_SECONDS
            done
          done
          echo "✅ Production health checks passed"
          echo "🌐 Site: https://primepisodes.com"

      - name: Deployment summary
        run: |
          echo "✅ PRODUCTION deployment completed successfully!"
          echo "======================================"
          echo "Environment: production"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: main"
          echo "Reason: ${{ github.event.inputs.reason }}"
          echo "Deployed by: ${{ github.actor }}"
          echo "Timestamp: $(date)"
          echo "======================================"

      - name: Notify on success
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            const reason = ${{ toJson(github.event.inputs.reason) }};
            const actor = ${{ toJson(github.actor) }};
            console.log('✅ PRODUCTION deployment completed successfully!');
            console.log('Reason:', reason);
            console.log('By:', actor);

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            console.log('❌ PRODUCTION deployment failed!')
            console.log('Please review logs immediately.')
