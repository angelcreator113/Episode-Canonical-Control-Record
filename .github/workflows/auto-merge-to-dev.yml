name: Auto-merge to Dev

on:
  push:
    branches:
      - 'claude/**'
      - '!claude/start-f-stats-1-g2'
      - '!claude/f-stats-1-phase-b-**'

concurrency:
  group: auto-merge-dev
  cancel-in-progress: false

jobs:
  merge-to-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GitHub App token is required so the push to dev triggers deploy-dev.yml.
          # GITHUB_TOKEN pushes do NOT trigger other workflows (GitHub security rule).
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Merge locally only — do NOT push yet. The build-verification step below
      # must succeed before we ship the merge commit to dev; otherwise a broken
      # half-merge (e.g. usages without declarations after -X ours) would land
      # on the shared branch and block every downstream claude/* session.
      - name: Merge into dev (local)
        id: merge
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Merging $BRANCH into dev locally..."

          git checkout dev
          git pull origin dev

          # Capture dev's tip BEFORE merging so the next step can diff the merge
          # against it to decide whether frontend paths were touched.
          echo "pre_merge_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

          # Try clean merge first
          if git merge origin/$BRANCH --no-edit -m "Auto-merge $BRANCH into dev"; then
            echo "merge_type=clean" >> "$GITHUB_OUTPUT"
            echo "✅ Clean merge."
            exit 0
          fi

          echo "⚠️  Merge conflict detected. Resolving by preferring dev..."
          git merge --abort

          # Retry with dev taking priority on conflicts.
          # Rationale: dev is the shared truth — if two claude/* sessions touch the
          # same file, the one that reaches dev first is already being validated by
          # CI and possibly running in the environment. Silently overwriting it with
          # an older feature-branch view of the world produces broken half-merges
          # (missing declarations for usages that landed earlier in dev).
          # With -X ours, the later branch loses *its own* changes in conflicting
          # hunks — which is visible to its author, easy to fix with a rebase+push,
          # and doesn't corrupt the shared branch.
          if git merge origin/$BRANCH --no-edit -m "Auto-merge $BRANCH into dev (resolved conflicts, dev wins)" -X ours; then
            echo "merge_type=conflicts-resolved" >> "$GITHUB_OUTPUT"
            echo "✅ Merged with conflict resolution (dev wins)."
          else
            echo "❌ Merge still failed even with -X ours. Manual resolution needed."
            git merge --abort
            exit 1
          fi

      # Skip the (slow) build verification when the merge only touches backend
      # code. `git diff --quiet` exits 0 when there are no changes in the given
      # paths, 1 when there are — we invert that to set a boolean output.
      - name: Detect frontend changes
        id: changes
        run: |
          if git diff --quiet "${{ steps.merge.outputs.pre_merge_sha }}" HEAD -- frontend/; then
            echo "frontend_changed=false" >> "$GITHUB_OUTPUT"
            echo "📦 No frontend changes in merge — skipping build verification."
          else
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
            echo "🔨 Frontend changed — will verify build."
          fi

      # Setup Node only when we actually need to build — saves ~5s on
      # backend-only merges and avoids wasting npm cache slots.
      - name: Setup Node.js
        if: steps.changes.outputs.frontend_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Verify the merged tree actually builds before pushing. Even a "clean"
      # three-way merge can produce broken code when two branches add
      # non-overlapping usages of an identifier that one branch forgot to
      # declare, or touch the same JSX tree in ways that balance per-branch
      # but not together. A post-merge build catches those silent breakages.
      - name: Verify frontend build
        if: steps.changes.outputs.frontend_changed == 'true'
        run: |
          echo "🔨 Verifying merged tree builds..."
          cd frontend
          npm ci --prefer-offline --no-audit --no-fund
          npx vite build
          echo "✅ Frontend build passed."

      - name: Push to dev
        run: |
          git push origin dev
          echo "✅ Pushed verified merge to dev."
