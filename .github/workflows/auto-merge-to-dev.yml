name: Auto-merge to Dev

on:
  push:
    branches:
      - 'claude/**'

concurrency:
  group: auto-merge-dev
  cancel-in-progress: false

jobs:
  merge-to-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GitHub App token is required so the push to dev triggers deploy-dev.yml.
          # GITHUB_TOKEN pushes do NOT trigger other workflows (GitHub security rule).
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge into dev
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Merging $BRANCH into dev..."

          git checkout dev
          git pull origin dev

          # Try clean merge first
          if git merge origin/$BRANCH --no-edit -m "Auto-merge $BRANCH into dev"; then
            git push origin dev
            echo "✅ Clean merge — pushed to dev."
            exit 0
          fi

          echo "⚠️  Merge conflict detected. Resolving by preferring dev..."
          git merge --abort

          # Retry with dev taking priority on conflicts.
          # Rationale: dev is the shared truth — if two claude/* sessions touch the
          # same file, the one that reaches dev first is already being validated by
          # CI and possibly running in the environment. Silently overwriting it with
          # an older feature-branch view of the world produces broken half-merges
          # (missing declarations for usages that landed earlier in dev).
          # With -X ours, the later branch loses *its own* changes in conflicting
          # hunks — which is visible to its author, easy to fix with a rebase+push,
          # and doesn't corrupt the shared branch.
          if git merge origin/$BRANCH --no-edit -m "Auto-merge $BRANCH into dev (resolved conflicts, dev wins)" -X ours; then
            git push origin dev
            echo "✅ Merged with conflict resolution (dev wins) — pushed to dev."
          else
            echo "❌ Merge still failed even with -X ours. Manual resolution needed."
            git merge --abort
            exit 1
          fi
