name: Deploy to Development

# ═══════════════════════════════════════════════════════════════════════════
# REWRITE 2026-07-10 — F-Deploy-1 Fix Plan v1.30 §5 (rewrite gate) / FD-57.
# Replaces the shared-box SSH deploy reviewed in v1.30 §2 (R1–R6).
#
# DESIGN (deltas from the pre-rewrite file):
#   • Transport: SSM RunCommand (FD-57, zero-inbound). No runner→SSH. The
#     Security Group is untouched by deploys.
#   • Targeting: by instance tag (Name=episode-dev-backend). NO host secret
#     exists on this path — DEV_EC2_HOST is retired (deleted with this PR's
#     gate) and EPISODE_DEV_BACKEND_HOST is unreferenced. Exceeds the v1.30
#     §5 pt-1 spec ("retarget to EPISODE_DEV_BACKEND_HOST"): recorded as a
#     spec delta — no lever can point at the shared box because no lever
#     exists.
#   • Runner auth: GitHub OIDC → role episode-gha-deploy-dev. No static AWS
#     keys on this path (F-Deploy-G1-AD retirement, this path only).
#   • Secrets: this workflow carries ZERO application secrets. No DEV_DB_*
#     injection, no write_env_key, no .env writes, no --update-env clobber.
#     The app and migrations read episode-metadata/dev/database via the
#     instance role (FD-55 decision (b), scope per FD-58). The CauseClosed
#     Sec 4 secret-clobber mechanism (v1.30 §2 R3) is structurally absent.
#   • Restart discipline: explicit scoped restart before the health check;
#     EXIT trap (armed only after DB env resolves, disarmed after the
#     explicit restart) as failure insurance for the window between eval
#     and restart.
#     --only episode-api,episode-worker is CONFIG HYGIENE, not shared-box
#     exclusion: the shipped ecosystem.config.js defines a prod-configured
#     app (episode-api-prod-hotfix); unscoped startOrRestart would
#     materialize it on any box. (RF-1–RF-4, Fix Plan v1.31.)
#   • DB env model (spec delta 3): migrations and PM2 process env carry
#     DB_* resolved at deploy time via scripts/print-db-env.js from the
#     secret (instance role). App-boot secret reading remains open inside
#     P4's code PR; the pm2-env-carried model is the acknowledged design
#     until then.
#
# TRIGGER POSTURE:
#   • NO push trigger exists anywhere in this file — deliberate, per the
#     CauseClosed (2026-07-01) Sec 6 abort-precondition. Binary check
#     (expected EMPTY):
#       git show origin/main:.github/workflows/deploy-dev.yml | Select-String -Pattern "^\s*push:"
#   • workflow_dispatch retained as the gated human lever (parity with
#     deploy-production per F-Deploy-G1-S).
#   • The Actions-level runtime disable (disabled_manually, 2026-07-01) is
#     workflow-ID state and SURVIVES this file's merge. Merging this rewrite
#     RE-ENABLES NOTHING. Re-enablement remains its own Rule 7 gate per Fix
#     Plan v1.28 §5 / v1.30 §5 pt-5.
#
# PREREQUISITES BEFORE FIRST DISPATCH (none exist at authoring; all gated):
#   P1  Instance role gains SSM permissions (AmazonSSMManagedInstanceCore or
#       scoped inline); instance registered — verify:
#         aws ssm describe-instance-information (non-empty for the instance)
#   P2  GitHub OIDC provider + IAM role episode-gha-deploy-dev (trust scoped
#       to this repo + environment "development"); permissions: S3 Put/Get on
#       s3://episode-metadata-storage-dev/deploys/*, ssm:SendCommand scoped
#       to the instance ARN + AWS-RunShellScript, ssm:ListCommandInvocations,
#       ssm:GetCommandInvocation
#   P3  Secret episode-metadata/dev/database exists + instance role carries
#       the secretsmanager read statement (FD-55(b), scope per FD-58; folds
#       into the FD-45 remediation window)
#   P4  App-side loader: scripts/print-db-env.js resolves DB_* from the
#       secret via the instance role (code PR, separate)
#   P5  Nginx provisioning on episode-dev-backend confirmed (frontend leg
#       fails loudly if absent — that is correct behavior, not a bug)
# ═══════════════════════════════════════════════════════════════════════════

on:
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # OIDC federation — see header; no static AWS keys on this path

env:
  AWS_REGION: us-east-1
  DEPLOY_BUCKET: episode-metadata-storage-dev
  DEPLOY_PREFIX: deploys/dev
  INSTANCE_TAG: episode-dev-backend

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: episode_metadata_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "DROP DATABASE IF EXISTS episode_metadata_test;"
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE episode_metadata_test;"

      - name: Run database migrations
        run: npm run migrate:up
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/episode_metadata_test
          NODE_ENV: test

      - name: Run tests
        run: npm test -- --coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/episode_metadata_test
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/episode_metadata_test
          JWT_SECRET: test-secret-key-minimum-32-characters-long
          NODE_ENV: test

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        run: |
          npm ci --production
          npm install --no-save sequelize-cli

      - name: Prune node_modules for deployment
        run: |
          echo "node_modules size before prune: $(du -sh node_modules | cut -f1)"
          find node_modules -type f \( \
            -name "*.md" -o -name "*.d.ts" -o -name "*.map" -o \
            -name "LICENSE*" -o -name "LICENCE*" -o -name "CHANGELOG*" -o \
            -name "CHANGES*" -o -name "HISTORY*" -o -name "README*" -o \
            -name "AUTHORS*" -o -name ".npmignore" -o -name ".gitignore" -o \
            -name ".eslintrc*" -o -name ".prettierrc*" -o -name ".babelrc*" -o \
            -name "*.flow" -o -name "Makefile" \
          \) -delete 2>/dev/null || true
          find node_modules -maxdepth 3 -type d \( \
            -name "__tests__" -o -name "test" -o -name "tests" -o \
            -name "spec" -o -name "docs" -o -name "doc" -o \
            -name "example" -o -name "examples" -o -name ".github" \
          \) -exec rm -rf {} + 2>/dev/null || true
          echo "node_modules size after prune: $(du -sh node_modules | cut -f1)"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          echo "Build complete:"
          ls -lh dist/assets/

      - name: Create artifact
        run: |
          mkdir -p deploy
          cp -r src deploy/
          cp -r scripts deploy/
          cp -r frontend/dist deploy/
          cp -r nginx deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp ecosystem.config.js deploy/
          cp .sequelizerc deploy/
          mv node_modules deploy/
          tar -czf episode-metadata-${{ github.sha }}.tar.gz deploy/
          echo "Artifact size: $(du -sh episode-metadata-${{ github.sha }}.tar.gz | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: episode-metadata-build-dev
          path: episode-metadata-${{ github.sha }}.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: development
      url: https://dev.primepisodes.com

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: episode-metadata-build-dev

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::637423256673:role/episode-gha-deploy-dev   # P2 — does not exist yet
          aws-region: us-east-1

      # Preflight replaces the old SSH-reachability probe in kind: verify the
      # target is SSM-managed and Online BEFORE uploading anything. Fail fast
      # with the P1 pointer if not.
      - name: Preflight — SSM target Online
        id: preflight
        run: |
          INFO=$(aws ssm describe-instance-information \
            --filters "Key=tag:Name,Values=${INSTANCE_TAG}" \
            --query "InstanceInformationList[?PingStatus=='Online'].[InstanceId,PingStatus,PlatformName]" \
            --output text)
          if [ -z "$INFO" ]; then
            echo "::error title=SSM preflight failed::No Online SSM-managed instance with tag Name=${INSTANCE_TAG}. Prerequisite P1 (see workflow header) is not satisfied, or the instance/agent is down."
            exit 1
          fi
          INSTANCE_ID=$(echo "$INFO" | head -1 | cut -f1)
          echo "✅ SSM target Online: $INSTANCE_ID"
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Write on-box deploy script
        run: |
          cat > deploy-on-box.sh <<'ONBOX'
          #!/usr/bin/env bash
          # Runs on episode-dev-backend as ubuntu (invoked via sudo -u ubuntu).
          # Expects env: ARTIFACT_URL (presigned), DEPLOY_SHA.
          # Carries NO credentials. DB env for migrations comes from
          # scripts/print-db-env.js reading episode-metadata/dev/database via
          # the instance role (P3/P4).
          set -eo pipefail

          APP_DIR=$HOME/episode-metadata
          mkdir -p "$APP_DIR/logs"

          # Scoped restart — RF-1 (v1.31): --only is CONFIG HYGIENE, not
          # shared-box exclusion. The shipped ecosystem.config.js still
          # defines episode-api-prod-hotfix (port 3000, NODE_ENV=production);
          # an unscoped startOrRestart would MATERIALIZE a prod-configured
          # process on this box. Scoping prevents that anywhere this file
          # runs. pm2 resurrect remains banned (stale-env rotation trap,
          # SESSION_HANDOFF.md).
          # NOTE: the EXIT trap is installed LATER — only after DB_* env is
          # resolved (RF-2, v1.31): a trap armed before the eval would fire
          # --update-env with empty DB env on early failure, clobbering a
          # healthy process — the R3 mechanism-family in miniature. Nothing
          # before the eval stops PM2, so no restart is owed before then.
          restore_pm2() {
            cd "$APP_DIR" 2>/dev/null || return
            pm2 startOrRestart ecosystem.config.js --only episode-api,episode-worker --update-env 2>&1 | tail -10 || true
            pm2 save 2>&1 | tail -2 || true
          }

          export NVM_DIR=$HOME/.nvm
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          echo "Node: $(node -v)  npm: $(npm -v)"
          if ! command -v pm2 &>/dev/null; then
            echo '📦 Installing pm2...'
            sudo npm install -g pm2
          fi
          echo "pm2: $(pm2 -v)"

          echo "💾 Disk before: $(df -h / | tail -1 | awk '{print $4}')"
          FREE_MB=$(df -BM --output=avail / | tail -1 | tr -d ' M')
          if [ "$FREE_MB" -lt 500 ]; then
            echo "🧹 Low disk (${FREE_MB}MB) — cleaning..."
            rm -rf "$APP_DIR/node_modules" "$APP_DIR/logs"/*.log ~/.pm2/logs/*.log /tmp/dev-deploy.tar.gz 2>/dev/null || true
            npm cache clean --force 2>/dev/null || true
            sudo journalctl --vacuum-size=10M 2>/dev/null || true
            sudo apt-get clean 2>/dev/null || true
          fi

          echo '⬇️  Fetching artifact...'
          curl -fsSL "$ARTIFACT_URL" -o /tmp/dev-deploy.tar.gz
          echo "Artifact: $(du -sh /tmp/dev-deploy.tar.gz | cut -f1) (sha ${DEPLOY_SHA})"

          # ─── Frontend + nginx (P5: fails loudly if nginx absent — correct) ───
          echo '🎨 Deploying frontend...'
          mkdir -p /tmp/deploy-tmp
          cd /tmp/deploy-tmp
          tar -xzf /tmp/dev-deploy.tar.gz --strip-components=1 deploy/dist deploy/nginx
          sudo rm -rf /var/www/html/*
          sudo cp -r dist/* /var/www/html/
          sudo chown -R www-data:www-data /var/www/html
          sudo chmod 755 /var/www/html /var/www/html/assets
          sudo cp nginx/episode-dev.conf /etc/nginx/sites-enabled/episode
          sudo nginx -t
          sudo systemctl restart nginx
          rm -rf /tmp/deploy-tmp
          echo '✅ Frontend + Nginx deployed'

          # ─── Backend ───
          echo '🔧 Deploying backend...'
          rm -rf "$APP_DIR/src" "$APP_DIR/scripts" "$APP_DIR/node_modules"
          cd "$APP_DIR"
          tar -xzf /tmp/dev-deploy.tar.gz --strip-components=1 \
            deploy/src deploy/scripts deploy/node_modules \
            deploy/package.json deploy/package-lock.json \
            deploy/ecosystem.config.js deploy/.sequelizerc
          rm -f /tmp/dev-deploy.tar.gz
          echo "Disk after extract: $(df -h / | tail -1 | awk '{print $4}')"

          # DB env from Secrets Manager via instance role — NO secrets arrive
          # with this deploy (P3/P4). print-db-env.js emits export lines.
          echo '🔐 Resolving DB env from episode-metadata/dev/database...'
          eval "$(node scripts/print-db-env.js)"

          # Trap armed HERE — after DB env exists, per RF-2 (see comment at
          # restore_pm2 above). From this point, any exit path restarts the
          # two dev processes with a complete environment.
          trap restore_pm2 EXIT

          echo '🔧 Bootstrapping migration metadata...'
          node scripts/bootstrap-sequelize-meta.js

          echo '🗃  Running migrations...'
          MIGRATION_FAILED=false
          if ! npx sequelize-cli db:migrate --env development 2>&1 | tail -20; then
            echo '⚠ Migration failed — trap will still restart PM2 so the site stays up'
            MIGRATION_FAILED=true
          fi

          # Explicit restart BEFORE the health check — RF-3 (v1.31): the trap
          # fires at EXIT, i.e. AFTER the health check runs; relying on it
          # alone means the check polls a not-yet-restarted (or, on first
          # deploy, never-started) app. The trap remains as failure insurance
          # for exit paths that skip this line.
          echo '🚀 Restarting PM2 (scoped)...'
          restore_pm2
          # RF-4 (v1.31): disarm — the restart is done. A trap left armed
          # would fire a SECOND restart at EXIT, after the health check has
          # already verified this one: an unverified restart behind a green
          # run. Every exit path below this line reports state; none changes
          # PM2 state; no insurance is owed.
          trap - EXIT

          echo '🏥 Health check...'
          HEALTHY=false
          for i in 1 2 3 4 5 6; do
            sleep 5
            if curl -sf http://localhost:3002/health > /dev/null 2>&1; then
              HEALTHY=true
              echo "✅ Backend healthy (attempt $i)"
              break
            fi
            echo "  ⏳ Attempt $i — not ready yet..."
          done
          if [ "$HEALTHY" != "true" ]; then
            echo '❌ Health check failed after 30s — PM2 logs:'
            pm2 logs episode-api --lines 30 --nostream || true
            exit 1
          fi

          echo '🔍 Route verification...'
          SHOWS_OK=false; EPISODES_OK=false
          curl -sf http://localhost:3002/api/v1/shows > /dev/null 2>&1 && SHOWS_OK=true
          curl -sf http://localhost:3002/api/v1/episodes > /dev/null 2>&1 && EPISODES_OK=true
          echo "  Shows route: $SHOWS_OK"
          echo "  Episodes route: $EPISODES_OK"

          echo "Disk final: $(df -h / | tail -1 | awk '{print $4}')"
          if [ "$MIGRATION_FAILED" = "true" ]; then
            echo '❌ Deployment completed but migrations failed'
            exit 1
          fi
          echo '✅ Full deployment complete'
          ONBOX
          chmod +x deploy-on-box.sh

      - name: Upload artifact + script to S3, presign
        id: s3
        run: |
          KEY_ART="${DEPLOY_PREFIX}/${{ github.sha }}/episode-metadata.tar.gz"
          KEY_SCR="${DEPLOY_PREFIX}/${{ github.sha }}/deploy-on-box.sh"
          aws s3 cp "episode-metadata-${{ github.sha }}.tar.gz" "s3://${DEPLOY_BUCKET}/${KEY_ART}"
          aws s3 cp deploy-on-box.sh "s3://${DEPLOY_BUCKET}/${KEY_SCR}"
          ART_URL=$(aws s3 presign "s3://${DEPLOY_BUCKET}/${KEY_ART}" --expires-in 1800)
          SCR_URL=$(aws s3 presign "s3://${DEPLOY_BUCKET}/${KEY_SCR}" --expires-in 1800)
          # Presigned URLs are capability tokens (30 min TTL) — mask from logs
          echo "::add-mask::$ART_URL"
          echo "::add-mask::$SCR_URL"
          echo "art_url=$ART_URL" >> "$GITHUB_OUTPUT"
          echo "scr_url=$SCR_URL" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSM RunCommand
        run: |
          INSTANCE_ID='${{ steps.preflight.outputs.instance_id }}'
          # Fetch script as root, execute as ubuntu with only two env values:
          # the presigned artifact URL and the sha. No credentials cross.
          CMD="curl -fsSL '${{ steps.s3.outputs.scr_url }}' -o /tmp/deploy-on-box.sh && chmod +x /tmp/deploy-on-box.sh && sudo -u ubuntu ARTIFACT_URL='${{ steps.s3.outputs.art_url }}' DEPLOY_SHA='${{ github.sha }}' bash /tmp/deploy-on-box.sh"
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "deploy-dev ${{ github.sha }}" \
            --timeout-seconds 900 \
            --parameters "{\"commands\":[\"$CMD\"],\"executionTimeout\":[\"900\"]}" \
            --query "Command.CommandId" --output text)
          echo "SSM CommandId: $COMMAND_ID"

          echo '⏳ Polling command status...'
          STATUS="Pending"
          for i in $(seq 1 60); do
            sleep 15
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "  [$i] $STATUS"
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut) break ;;
            esac
          done

          echo '─── On-box output (stdout tail) ───'
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text | tail -80
          if [ "$STATUS" != "Success" ]; then
            echo '─── On-box stderr tail ───'
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" --output text | tail -40
            echo "::error title=Deploy failed::SSM command ended $STATUS"
            exit 1
          fi
          echo '✅ Deploy Success'

      - name: Cleanup S3 deploy objects
        if: always()
        run: |
          aws s3 rm "s3://${DEPLOY_BUCKET}/${DEPLOY_PREFIX}/${{ github.sha }}/" --recursive || true

      - name: Deployment summary
        run: |
          echo "## Dev Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Transport: SSM RunCommand (FD-57, zero-inbound)" >> $GITHUB_STEP_SUMMARY
          echo "- Target: tag Name=episode-dev-backend (no host secret)" >> $GITHUB_STEP_SUMMARY
          echo "- Secrets carried by this workflow: NONE" >> $GITHUB_STEP_SUMMARY
          echo "- Site: https://dev.primepisodes.com" >> $GITHUB_STEP_SUMMARY
