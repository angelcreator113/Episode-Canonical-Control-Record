# docker-compose.parity.yml — P-4/P-5 evidence. app + disposable Postgres.
# No localstack, no AWS, no creds, no route to prod box or canon RDS.
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: evidence
      POSTGRES_PASSWORD: evidence
      POSTGRES_DB: evidence
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evidence -d evidence"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    image: p4p5-parity
    build:
      context: .
      dockerfile: Dockerfile.parity
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://evidence:evidence@postgres:5432/evidence
      PORT: "3000"
      HOST: "0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
